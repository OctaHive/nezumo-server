name: Release backend

on:
  push:
    tags:
      - v*

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  build:
    name: Test and build Linux package
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential clang cmake libssl-dev ninja-build pkg-config

      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust build files
        uses: Swatinem/rust-cache@v2

      - name: Validate tag against Cargo package version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail

          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[0].version')"
          expected_tag="v${cargo_version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}; expected ${expected_tag}"
            exit 1
          fi

          echo "version=${cargo_version}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Create deployment package
        id: package
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -Eeuo pipefail

          archive_name="nezumo-${PACKAGE_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          package_dir="$(mktemp -d)"
          chmod 0755 "${package_dir}"

          install -m 0755 target/release/nezumo "${package_dir}/nezumo"
          cp -a migrations "${package_dir}/migrations"
          cp -a fonts "${package_dir}/fonts"
          install -d "${package_dir}/templates/mail"
          install -m 0644 src/mail/footer.html "${package_dir}/templates/mail/footer.html"
          printf '%s\n' "${PACKAGE_VERSION}" > "${package_dir}/VERSION"
          printf '%s\n' "${GITHUB_SHA}" > "${package_dir}/REVISION"

          tar -C "${package_dir}" -czf "${archive_name}" .
          sha256sum "${archive_name}" > "${archive_name}.sha256"

          echo "archive_name=${archive_name}" >> "${GITHUB_OUTPUT}"

      - name: Store release package
        uses: actions/upload-artifact@v4
        with:
          name: nezumo-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu
          path: |
            ${{ steps.package.outputs.archive_name }}
            ${{ steps.package.outputs.archive_name }}.sha256
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/nezumo' }}
      DEPLOY_SERVICES: ${{ vars.DEPLOY_SERVICES || 'nezumo.service' }}

    steps:
      - name: Check out deployment script
        uses: actions/checkout@v4

      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          pattern: nezumo-*-x86_64-unknown-linux-gnu
          merge-multiple: true
          path: release

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail

          for name in DEPLOY_HOST DEPLOY_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Required production secret ${name} is not configured"
              exit 1
            fi
          done

          if [[ ! "${DEPLOY_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_PORT must be numeric"
            exit 1
          fi

          install -d -m 0700 "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/deploy_key"
          chmod 0600 "${HOME}/.ssh/deploy_key"
          printf '%s\n' "${SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 0644 "${HOME}/.ssh/known_hosts"

      - name: Verify and deploy package
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -t archives < <(find release -maxdepth 1 -type f -name '*.tar.gz' -print)
          if [[ "${#archives[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one release archive, found ${#archives[@]}"
            exit 1
          fi

          archive="${archives[0]}"
          expected_sha="$(awk 'NR == 1 {print $1}' "${archive}.sha256")"
          archive_sha="$(sha256sum "${archive}" | awk '{print $1}')"
          if [[ ! "${expected_sha}" =~ ^[a-f0-9]{64}$ || "${archive_sha}" != "${expected_sha}" ]]; then
            echo "::error::Release archive checksum mismatch"
            exit 1
          fi

          remote_archive="/tmp/nezumo-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.tar.gz"
          target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_options=(-i "${HOME}/.ssh/deploy_key" -p "${DEPLOY_PORT}" -o BatchMode=yes)

          scp -i "${HOME}/.ssh/deploy_key" -P "${DEPLOY_PORT}" -o BatchMode=yes \
            "${archive}" "${target}:${remote_archive}"

          deploy_path_b64="$(printf '%s' "${DEPLOY_PATH}" | base64 -w0)"
          deploy_services_b64="$(printf '%s' "${DEPLOY_SERVICES}" | base64 -w0)"
          release_name="${GITHUB_REF_NAME}"
          release_name_b64="$(printf '%s' "${release_name}" | base64 -w0)"

          # These client-side values contain only fixed paths, digits, hex, or base64.
          # shellcheck disable=SC2029
          ssh "${ssh_options[@]}" "${target}" \
            "bash -s -- '${remote_archive}' '${deploy_path_b64}' '${deploy_services_b64}' '${release_name_b64}' '${archive_sha}'" \
            < scripts/deploy-release.sh
